name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate JSON files
        run: |
          echo "Checking all JSON files..."
          find . -name "*.json" -not -path "./.git/*" -print0 | xargs -0 -n1 jq empty

      - name: Lint mcfunction files (pre-check)
        run: |
          echo "Scanning .mcfunction files..."
          FILES=$(find . -name "*.mcfunction" -not -path "./.git/*")
          if [ -z "$FILES" ]; then
            echo "No .mcfunction files found."
            exit 0
          fi

          ERRORS=0
          while IFS= read -r file; do
            if head -c 3 "$file" | grep -qP '^\xef\xbb\xbf'; then
              echo "::error::BOM detected: $file"
              ERRORS=$((ERRORS + 1))
            fi
            if grep -Pql '\x00' "$file"; then
              echo "::error::Null byte detected: $file"
              ERRORS=$((ERRORS + 1))
            fi
            if file "$file" | grep -q "CRLF"; then
              echo "::error::CRLF line endings: $file"
              ERRORS=$((ERRORS + 1))
            fi
          done <<< "$FILES"

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS issue(s) found in .mcfunction files."
            exit 1
          fi
          echo "Pre-check passed."

      - name: Install mecha
        run: pip install git+https://github.com/mcbeet/mecha.git --break-system-packages -q

      - name: Patch mecha compatibility
        run: |
          echo "Applying compatibility patches..."
          find . -name "*.mcfunction" -not -path "./.git/*" \
            -exec grep -lP '[\w.-]+: _' {} \; | \
            xargs --no-run-if-empty sed -i -E 's/([a-z0-9._-]+): _/\1:_/g'

          find . -name "*.mcfunction" -not -path "./.git/*" \
            -exec grep -l 'time of ' {} \; | \
            xargs --no-run-if-empty sed -i -E 's/time of [a-z0-9_:.-]+ /time /g'

          find . -name "*.mcfunction" -not -path "./.git/*" \
            -exec grep -l 'time query day repetition' {} \; | \
            xargs --no-run-if-empty sed -i 's/time query day repetition/time query daytime/g'

      - name: Validate mcfunction syntax (mecha)
        run: mecha .

      - name: Validate pack.mcmeta
        run: |
          if [ ! -f dataLib-DP/pack.mcmeta ]; then
            echo "::error::pack.mcmeta is missing!"
            exit 1
          fi
          jq empty dataLib-DP/pack.mcmeta && echo "pack.mcmeta is valid."

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - name: Repo lock
        run: |
          if [ "$GITHUB_REPOSITORY" != "runtoolkit/dataLib-next" ]; then
            echo "::error::This workflow may only run in runtoolkit/dataLib-next."
            exit 1
          fi

      - name: Prepare build directory
        run: |
          mkdir -p build/dataLib-DP
          shopt -s dotglob
          cp -r dataLib-DP/* build/dataLib-DP/ 2>/dev/null || true
          if [ -f pack.mcmeta ]; then
            cp pack.mcmeta build/dataLib-DP/
          fi

      - name: Validate pack.mcmeta
        run: |
          jq empty build/dataLib-DP/pack.mcmeta && echo "pack.mcmeta is valid." \
            || { echo "::error::pack.mcmeta is malformed!"; exit 1; }

      - name: Package datapack
        run: |
          cd build
          zip -r ../dataLib-full.zip dataLib-DP
          echo "Archive size: $(du -sh ../dataLib-full.zip | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dataLib-full
          path: dataLib-full.zip
          retention-days: 14
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Repo lock
        run: |
          if [ "$GITHUB_REPOSITORY" != "runtoolkit/dataLib-next" ]; then
            echo "::error::This workflow may only run in runtoolkit/dataLib-next."
            exit 1
          fi

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: dataLib-full
          path: dist/

      - name: Read version
        id: ver
        run: |
          VERSION=$(jq -r '
            .pack.description |
            if type == "array" then
              .[] | select(type == "object") |
              .text // empty
            else . end |
            select(test("^\\s*\\|\\s*v[0-9]")) |
            gsub("^\\s*\\|\\s*"; "") | ltrimstr(" ")
          ' dataLib-DP/pack.mcmeta 2>/dev/null | head -1)

          if [ -z "$VERSION" ]; then
            VERSION=$(jq -r '.pack.description' dataLib-DP/pack.mcmeta 2>/dev/null | grep -oP 'v[\d.]+' | head -1)
          fi

          echo "version=${VERSION:-latest}" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.version }}"
          ZIP="dist/dataLib-full.zip"

          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            --title "dataLib $TAG" \
            --notes "**Full datapack build** (pack_format 101)." \
            --latest \
            "$ZIP#dataLib-full.zip"
        summary:
       # ─────────────── SON ÖZET ───────────────
      - name: Summary
        run: |
          echo "## ✅ Build & Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** $GITHUB_REPOSITORY" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** $GITHUB_REF_NAME" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.ver.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Success" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 Full datapack: \`dataLib-full.zip\`" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download from the latest release." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Generated on $(date -u +"%Y-%m-%d %H:%M:%S UTC")*" >> $GITHUB_STEP_SUMMARY
